# Generated with nix2hpack from package.nix

author: Christian Georgii
category: Database
default-extensions:
  - BlockArguments
  - DataKinds
  - DeriveAnyClass
  - DerivingStrategies
  - DerivingVia
  - DuplicateRecordFields
  - FlexibleContexts
  - GADTs
  - LambdaCase
  - MultiWayIf
  - OverloadedLabels
  - OverloadedRecordDot
  - OverloadedStrings
  - StrictData
  - TemplateHaskell
  - TypeFamilies
dependencies:
  - effectful-core >=2.6 && <2.7
  - effectful-plugin >=2.0 && <2.1
description: Relational database access via Hasql and Rel8, exposed as an Effectful effect — part of the atelier toolkit.
extra-doc-files:
  - CHANGELOG.md
  - README.md
ghc-options:
  - -Weverything
  - -Wno-unsafe
  - -Wno-missing-safe-haskell-mode
  - -Wno-monomorphism-restriction
  - -Wno-missing-kind-signatures
  - -Wno-missing-poly-kind-signatures
  - -Wno-missing-role-annotations
  - -Wno-missing-local-signatures
  - -Wno-missing-import-lists
  - -Wno-implicit-prelude
  - -Wno-unticked-promoted-constructors
  - -Wno-unused-packages
  - -Wno-all-missed-specialisations
  - -Wno-missed-specialisations
  - -fplugin=Effectful.Plugin
  - -threaded
github: atelier-hub/tricorder
language: GHC2021
library:
  dependencies:
    - mixin:
        - hiding (Prelude)
      name: base
      version: '>=4.20 && < 4.21'
    - atelier-prelude >=0.1 && <0.2
    - atelier-core >=0.1 && <0.2
    - aeson >=2.2 && <2.3
    - bytestring >=0.12 && <0.13
    - containers >=0.7 && <0.8
    - data-default >=0.8 && <0.9
    - effectful >=2.6 && <2.7
    - effectful-th >=1.0 && <1.1
    - hasql >=1.9 && <1.10
    - hasql-pool >=1.3 && <1.4
    - hasql-transaction >=1.2 && <1.3
    - rel8 >=1.7 && <1.8
    - text >=2.1 && <2.2
    - time >=1.12 && <1.13
  source-dirs: src
license: MIT
license-file: LICENSE
maintainer: christian.georgii@tweag.io
name: atelier-db
synopsis: Relational database effect for atelier (Hasql/Rel8)
version: 0.1.0.0
