name:                atelier-db
version:             0.1.0.0
synopsis:            Relational database effect for atelier (Hasql/Rel8)
description:         Relational database access via Hasql and Rel8, exposed as an Effectful effect — part of the atelier toolkit.
author:              Christian Georgii
maintainer:          cgeorgii@gmail.com
license:             MIT
license-file:        LICENSE
github:              atelier-hub/tricorder
category:            Database

extra-doc-files:
- CHANGELOG.md

language: GHC2021

ghc-options:
- -Weverything
- -Wno-unsafe
- -Wno-missing-safe-haskell-mode
- -Wno-monomorphism-restriction
- -Wno-missing-kind-signatures
- -Wno-missing-poly-kind-signatures
- -Wno-missing-role-annotations
- -Wno-missing-local-signatures
- -Wno-missing-import-lists
- -Wno-implicit-prelude
- -Wno-unticked-promoted-constructors
- -Wno-unused-packages
- -fplugin=Effectful.Plugin
- -threaded

dependencies:
- effectful-core >=2.6 && <2.7
- effectful-plugin >=2.0 && <2.1

default-extensions:
- BlockArguments
- DataKinds
- DeriveAnyClass
- DerivingStrategies
- DerivingVia
- DuplicateRecordFields
- FlexibleContexts
- GADTs
- LambdaCase
- MultiWayIf
- OverloadedLabels
- OverloadedRecordDot
- OverloadedStrings
- StrictData
- TemplateHaskell
- TypeFamilies

library:
  source-dirs: src
  dependencies:
  - name: base
    version: ">=4.20 && <4.21"
    mixin:
      - hiding (Prelude)
  - atelier-prelude >=0.1 && <0.2
  - atelier-core >=0.1 && <0.2
  - aeson >=2.2 && <2.3
  - bytestring >=0.12 && <0.13
  - containers >=0.7 && <0.8
  - data-default >=0.8 && <0.9
  - effectful >=2.6 && <2.7
  - effectful-th >=1.0 && <1.1
  - hasql >=1.9 && <1.10
  - hasql-pool >=1.3 && <1.4
  - hasql-transaction >=1.2 && <1.3
  - rel8 >=1.7 && <1.8
  - text >=2.1 && <2.2
  - time >=1.12 && <1.13
