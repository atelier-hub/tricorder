# Generated with nix2hpack from package.nix

author: Christian Georgii
category: Prelude
default-extensions:
  - BlockArguments
  - DataKinds
  - DeriveAnyClass
  - DerivingStrategies
  - DerivingVia
  - DuplicateRecordFields
  - FlexibleContexts
  - GADTs
  - LambdaCase
  - MultiWayIf
  - OverloadedLabels
  - OverloadedRecordDot
  - OverloadedStrings
  - StrictData
  - TemplateHaskell
  - TypeFamilies
description: A custom prelude based on relude, adapted for Effectful — part of the atelier toolkit.
extra-doc-files:
  - CHANGELOG.md
  - README.md
ghc-options:
  - -Weverything
  - -Wno-unsafe
  - -Wno-missing-safe-haskell-mode
  - -Wno-monomorphism-restriction
  - -Wno-missing-kind-signatures
  - -Wno-missing-poly-kind-signatures
  - -Wno-missing-role-annotations
  - -Wno-missing-local-signatures
  - -Wno-missing-import-lists
  - -Wno-implicit-prelude
  - -Wno-unticked-promoted-constructors
  - -Wno-unused-packages
  - -Wno-all-missed-specialisations
  - -Wno-missed-specialisations
github: atelier-hub/tricorder
homepage: https://github.com/atelier-hub/tricorder/tree/main/atelier-prelude
language: GHC2021
library:
  dependencies:
    - base >=4.20 && < 4.21
    - effectful-core >=2.6 && <2.7
    - relude >=1.2 && <1.3
  source-dirs: src
license: MIT
license-file: LICENSE
maintainer: christian.georgii@tweag.io
name: atelier-prelude
synopsis: Custom relude-based prelude with Effectful conventions
version: 0.1.0.0
