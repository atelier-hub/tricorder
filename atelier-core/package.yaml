_common/lib: !include "../_common/package.yaml"

name:                atelier-core
version:             0.1.0.0
synopsis:            Foundational Effectful-based effects and utilities
description:         Core effects and utilities for effect-based applications, built on Effectful — part of the atelier toolkit.
author:              Christian Georgii
maintainer:          christian.georgii@tweag.io
license:             MIT
license-file:        LICENSE
github:              atelier-hub/tricorder
category:            Control

extra-doc-files:
- CHANGELOG.md
- README.md

language: GHC2021

ghc-options:
- -Weverything
- -Wno-unsafe
- -Wno-missing-safe-haskell-mode
- -Wno-monomorphism-restriction
- -Wno-missing-kind-signatures
- -Wno-missing-poly-kind-signatures
- -Wno-missing-role-annotations
- -Wno-missing-local-signatures
- -Wno-missing-import-lists
- -Wno-implicit-prelude
- -Wno-unticked-promoted-constructors
- -Wno-unused-packages
# Missed-specialisation warnings fire on imported overloaded functions (e.g.
# realToFrac, Data.Fixed instances, prometheus exporters) that we can't annotate
# with INLINABLE. They only appear under optimization and aren't actionable.
- -Wno-all-missed-specialisations
- -Wno-missed-specialisations
- -fplugin=Effectful.Plugin
- -threaded

dependencies:
- *dep-effectful-core
- *dep-effectful-plugin

default-extensions:
- BlockArguments
- DataKinds
- DeriveAnyClass
- DerivingStrategies
- DerivingVia
- DuplicateRecordFields
- FlexibleContexts
- GADTs
- LambdaCase
- MultiWayIf
- OverloadedLabels
- OverloadedRecordDot
- OverloadedStrings
- StrictData
- TemplateHaskell
- TypeFamilies

library:
  source-dirs: src
  dependencies:
  - name: base
    version: *version-base
    mixin:
      - hiding (Prelude)
  - *dep-atelier-prelude
  - *dep-aeson
  - *dep-base64-bytestring
  - *dep-bytestring
  - *dep-casing
  - *dep-containers
  - *dep-contra-tracer
  - *dep-daemons
  - *dep-data-default
  - *dep-directory
  - *dep-effectful
  - *dep-effectful-th
  - *dep-filepath
  - *dep-fsnotify
  - *dep-hs-opentelemetry-api
  - *dep-hs-opentelemetry-exporter-otlp
  - *dep-hs-opentelemetry-sdk
  - *dep-http-api-data
  - *dep-http-types
  - *dep-ki
  - *dep-list-t
  - *dep-optparse-applicative
  - *dep-process
  - *dep-prometheus-client
  - *dep-prometheus-metrics-ghc
  - *dep-stm
  - *dep-stm-containers
  - *dep-text
  - *dep-time
  - *dep-time-units
  - *dep-typed-process
  - *dep-unagi-chan
  - *dep-unix
  - *dep-unordered-containers
  - *dep-uuid
  - *dep-wai
  - *dep-warp

tests:
  atelier-test:
    main:                Driver.hs
    source-dirs:         test
    ghc-options:
    - -Wno-prepositive-qualified-module
    build-tools:
    - tasty-discover:tasty-discover
    dependencies:
    - name: base
      version: *version-base
      mixin:
        - hiding (Prelude)
    - *dep-atelier-prelude
    - *dep-atelier-core
    - *dep-aeson
    - *dep-async
    - *dep-bytestring
    - *dep-containers
    - *dep-data-default
    - *dep-effectful
    - *dep-hedgehog
    - *dep-hs-opentelemetry-api
    - *dep-hspec
    - *dep-hspec-hedgehog
    - *dep-stm
    - *dep-stm-containers
    - *dep-tasty
    - *dep-tasty-hspec
    - *dep-time
