name:                atelier-core
version:             0.1.0.0
synopsis:            Foundational Effectful-based effects and utilities
description:         Core effects and utilities for effect-based applications, built on Effectful — part of the atelier toolkit.
author:              Christian Georgii
maintainer:          cgeorgii@gmail.com
license:             MIT
license-file:        LICENSE
github:              atelier-hub/tricorder
category:            Control

extra-doc-files:
- CHANGELOG.md
- README.md

language: GHC2021

ghc-options:
- -Weverything
- -Wno-unsafe
- -Wno-missing-safe-haskell-mode
- -Wno-monomorphism-restriction
- -Wno-missing-kind-signatures
- -Wno-missing-poly-kind-signatures
- -Wno-missing-role-annotations
- -Wno-missing-local-signatures
- -Wno-missing-import-lists
- -Wno-implicit-prelude
- -Wno-unticked-promoted-constructors
- -Wno-unused-packages
# Missed-specialisation warnings fire on imported overloaded functions (e.g.
# realToFrac, Data.Fixed instances, prometheus exporters) that we can't annotate
# with INLINABLE. They only appear under optimization and aren't actionable.
- -Wno-all-missed-specialisations
- -Wno-missed-specialisations
- -fplugin=Effectful.Plugin
- -threaded

dependencies:
- effectful-core >=2.6 && <2.7
- effectful-plugin >=2.0 && <2.1

default-extensions:
- BlockArguments
- DataKinds
- DeriveAnyClass
- DerivingStrategies
- DerivingVia
- DuplicateRecordFields
- FlexibleContexts
- GADTs
- LambdaCase
- MultiWayIf
- OverloadedLabels
- OverloadedRecordDot
- OverloadedStrings
- StrictData
- TemplateHaskell
- TypeFamilies

library:
  source-dirs: src
  dependencies:
  - name: base
    version: ">=4.20 && <4.21"
    mixin:
      - hiding (Prelude)
  - atelier-prelude >=0.1 && <0.2
  - aeson >=2.2 && <2.3
  - base64-bytestring >=1.2 && <1.3
  - bytestring >=0.12 && <0.13
  - casing >=0.1 && <0.2
  - containers >=0.7 && <0.8
  - contra-tracer >=0.2 && <0.3
  - daemons >=0.4 && <0.5
  - data-default >=0.8 && <0.9
  - directory >=1.3 && <1.4
  - effectful >=2.6 && <2.7
  - effectful-th >=1.0 && <1.1
  - filepath >=1.5 && <1.6
  - fsnotify >=0.4 && <0.5
  - hs-opentelemetry-api >=0.3 && <0.4
  - hs-opentelemetry-exporter-otlp >=0.1 && <0.2
  - hs-opentelemetry-sdk >=0.1 && <0.2
  - http-api-data >=0.7 && <0.8
  - http-types >=0.12 && <0.13
  - ki >=1.0 && <1.1
  - list-t >=1.0 && <1.1
  - optparse-applicative >=0.19 && <0.20
  - process >=1.6 && <1.7
  - prometheus-client >=1.1 && <1.2
  - prometheus-metrics-ghc >=1.0 && <1.1
  - stm >=2.5 && <2.6
  - stm-containers >=1.2 && <1.3
  - text >=2.1 && <2.2
  - time >=1.12 && <1.13
  - time-units >=1.0 && <1.1
  - typed-process >=0.2 && <0.3
  - unagi-chan >=0.4 && <0.5
  - unix >=2.8 && <2.9
  - unordered-containers >=0.2 && <0.3
  - uuid >=1.3 && <1.4
  - wai >=3.2 && <3.3
  - warp >=3.4 && <3.5

tests:
  atelier-test:
    main:                Driver.hs
    source-dirs:         test
    ghc-options:
    - -Wno-prepositive-qualified-module
    build-tools:
    - tasty-discover:tasty-discover
    dependencies:
    - name: base
      version: ">=4.20 && <4.21"
      mixin:
        - hiding (Prelude)
    - atelier-prelude >=0.1 && <0.2
    - atelier-core >=0.1 && <0.2
    - aeson >=2.2 && <2.3
    - async >=2.2 && <2.3
    - bytestring >=0.12 && <0.13
    - containers >=0.7 && <0.8
    - data-default >=0.8 && <0.9
    - effectful >=2.6 && <2.7
    - hedgehog >=1.7 && <1.8
    - hs-opentelemetry-api >=0.3 && <0.4
    - hspec >=2.11 && <2.12
    - hspec-hedgehog >=0.3 && <0.4
    - stm >=2.5 && <2.6
    - stm-containers >=1.2 && <1.3
    - tasty >=1.5 && <1.6
    - tasty-hspec >=1.2 && <1.3
    - time >=1.12 && <1.13
