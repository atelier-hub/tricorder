name:                atelier-core
version:             0.1.0.0
synopsis:            Foundational Effectful-based effects and utilities
description:         Core effects and utilities for effect-based applications, built on Effectful — part of the atelier toolkit.
author:              Christian Georgii
maintainer:          cgeorgii@gmail.com
license:             MIT

language: GHC2021

ghc-options:
- -Weverything
- -Wno-unsafe
- -Wno-missing-safe-haskell-mode
- -Wno-monomorphism-restriction
- -Wno-missing-kind-signatures
- -Wno-missing-poly-kind-signatures
- -Wno-missing-role-annotations
- -Wno-missing-local-signatures
- -Wno-missing-import-lists
- -Wno-implicit-prelude
- -Wno-unticked-promoted-constructors
- -Wno-unused-packages
- -O0
- -fplugin=Effectful.Plugin
- -threaded

dependencies:
- effectful-core
- effectful-plugin

default-extensions:
- BlockArguments
- DataKinds
- DeriveAnyClass
- DerivingStrategies
- DerivingVia
- DuplicateRecordFields
- FlexibleContexts
- GADTs
- LambdaCase
- MultiWayIf
- OverloadedLabels
- OverloadedRecordDot
- OverloadedStrings
- StrictData
- TemplateHaskell
- TypeFamilies

library:
  source-dirs: src
  dependencies:
  - name: base
    mixin:
      - hiding (Prelude)
  - atelier-prelude
  - aeson
  - base64-bytestring
  - bytestring
  - casing
  - containers
  - contra-tracer
  - daemons
  - data-default
  - directory
  - effectful
  - effectful-th
  - filepath
  - fsnotify
  - hs-opentelemetry-api
  - hs-opentelemetry-exporter-otlp
  - hs-opentelemetry-sdk
  - http-api-data
  - http-types
  - ki
  - list-t
  - prometheus-client
  - prometheus-metrics-ghc
  - stm
  - stm-containers
  - text
  - time
  - time-units
  - unagi-chan
  - unix
  - unordered-containers
  - uuid
  - wai
  - warp

tests:
  atelier-test:
    main:                Driver.hs
    source-dirs:         test
    ghc-options:
    - -Wno-prepositive-qualified-module
    build-tools:
    - tasty-discover:tasty-discover
    dependencies:
    - name: base
      mixin:
        - hiding (Prelude)
    - atelier-prelude
    - atelier-core
    - aeson
    - async
    - bytestring
    - containers
    - data-default
    - effectful
    - hedgehog
    - hs-opentelemetry-api
    - hspec
    - hspec-hedgehog
    - stm
    - stm-containers
    - tasty
    - tasty-hspec
    - time
