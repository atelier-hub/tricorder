<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">

  <!-- Background -->
  <rect width="256" height="256" rx="40" ry="40" fill="#1e2840"/>

  <!-- Body -->
  <rect x="56" y="40" width="144" height="178" rx="10" ry="10" fill="#1c1812"/>

  <!-- Scanner circle -->
  <circle cx="128" cy="92" r="38" fill="#040a02" stroke="#d4a820" stroke-width="6"/>

  <!-- Scan cone: arc sector inset from the circle stroke -->
  <path d="M 128,92 L 128,59 A 33,33 0 0,1 151,69 Z" fill="#5a9822" opacity="0.7"/>

  <!-- Dividing stripe -->
  <rect x="56" y="148" width="144" height="8" rx="2" fill="#c89818"/>

  <!-- Keypad (6 subtle buttons, 3×2) -->
  <rect x="82" y="163" width="26" height="11" rx="2" fill="#252010"/>
  <rect x="115" y="163" width="26" height="11" rx="2" fill="#252010"/>
  <rect x="148" y="163" width="26" height="11" rx="2" fill="#252010"/>
  <rect x="82" y="178" width="26" height="11" rx="2" fill="#252010"/>
  <rect x="115" y="178" width="26" height="11" rx="2" fill="#252010"/>
  <rect x="148" y="178" width="26" height="11" rx="2" fill="#252010"/>

  <!-- Distinct button -->
  <rect x="98" y="197" width="60" height="16" rx="3" fill="#7a6012"/>

</svg>
