<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">

  <!-- ===== ROUNDED ICON FRAME ===== -->
  <rect width="256" height="256" rx="40" ry="40" fill="#3c4a58"/>

  <!-- ===== ANTENNA ===== -->
  <rect x="152" y="10" width="9" height="43" rx="4" ry="4" fill="#16162a"/>

  <!-- ===== PHONE BODY ===== -->
  <rect x="88" y="40" width="80" height="188" rx="8" ry="8" fill="#1c1c2e"/>
  <!-- Left-edge highlight (simulates 3D curvature) -->
  <rect x="89" y="49" width="4" height="172" rx="2" fill="#2c2c42" opacity="0.9"/>
  <!-- Right-edge shadow -->
  <rect x="163" y="49" width="4" height="172" rx="2" fill="#101018" opacity="0.8"/>

  <!-- ===== EARPIECE GRILLE ===== -->
  <rect x="105" y="50" width="46" height="5" rx="2" fill="#0c0c18"/>

  <!-- ===== LCD SCREEN ===== -->
  <!-- Screen bezel -->
  <rect x="95" y="59" width="66" height="52" rx="4" fill="#0c0c18"/>
  <!-- Screen glass (green LCD) -->
  <rect x="98" y="62" width="60" height="46" rx="2" fill="#1a3c10"/>
  <!-- Simulated LCD pixel rows -->
  <rect x="101" y="65" width="54" height="8" rx="1" fill="#3c7418"/>
  <rect x="101" y="76" width="38" height="5" rx="1" fill="#306010"/>
  <rect x="101" y="84" width="50" height="5" rx="1" fill="#2e5c10"/>
  <rect x="101" y="92" width="24" height="5" rx="1" fill="#2a540e"/>

  <!-- ===== CALL / END BUTTONS ===== -->
  <!-- Send/Call (green) -->
  <rect x="95" y="120" width="30" height="13" rx="4" fill="#165216"/>
  <!-- End/Power (red) -->
  <rect x="131" y="120" width="30" height="13" rx="4" fill="#521616"/>

  <!-- ===== NUMERIC KEYPAD ===== -->
  <!-- Row 1: 1 2 3 -->
  <rect x="93" y="139" width="20" height="13" rx="3" fill="#2e2e44"/>
  <rect x="118" y="139" width="20" height="13" rx="3" fill="#2e2e44"/>
  <rect x="143" y="139" width="20" height="13" rx="3" fill="#2e2e44"/>
  <!-- Row 2: 4 5 6 -->
  <rect x="93" y="156" width="20" height="13" rx="3" fill="#2e2e44"/>
  <rect x="118" y="156" width="20" height="13" rx="3" fill="#2e2e44"/>
  <rect x="143" y="156" width="20" height="13" rx="3" fill="#2e2e44"/>
  <!-- Row 3: 7 8 9 -->
  <rect x="93" y="173" width="20" height="13" rx="3" fill="#2e2e44"/>
  <rect x="118" y="173" width="20" height="13" rx="3" fill="#2e2e44"/>
  <rect x="143" y="173" width="20" height="13" rx="3" fill="#2e2e44"/>
  <!-- Row 4: * 0 # -->
  <rect x="93" y="190" width="20" height="13" rx="3" fill="#2e2e44"/>
  <rect x="118" y="190" width="20" height="13" rx="3" fill="#2e2e44"/>
  <rect x="143" y="190" width="20" height="13" rx="3" fill="#2e2e44"/>

  <!-- Button labels -->
  <text x="103" y="149" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="#7878a0">1</text>
  <text x="128" y="149" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="#7878a0">2</text>
  <text x="153" y="149" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="#7878a0">3</text>
  <text x="103" y="166" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="#7878a0">4</text>
  <text x="128" y="166" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="#7878a0">5</text>
  <text x="153" y="166" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="#7878a0">6</text>
  <text x="103" y="183" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="#7878a0">7</text>
  <text x="128" y="183" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="#7878a0">8</text>
  <text x="153" y="183" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="#7878a0">9</text>
  <text x="103" y="200" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="#7878a0">*</text>
  <text x="128" y="200" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="#7878a0">0</text>
  <text x="153" y="200" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="#7878a0">#</text>

  <!-- ===== MICROPHONE GRILLE ===== -->
  <rect x="111" y="210" width="34" height="3" rx="1" fill="#0c0c18"/>
  <rect x="115" y="216" width="26" height="3" rx="1" fill="#0c0c18"/>
  <rect x="111" y="222" width="34" height="3" rx="1" fill="#0c0c18"/>

</svg>
