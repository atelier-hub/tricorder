<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">

  <!-- Background -->
  <rect width="256" height="256" rx="40" ry="40" fill="#1e2840"/>

  <!-- Body -->
  <rect x="56" y="40" width="144" height="178" rx="10" ry="10" fill="#1c1812"/>

  <!-- Circular scanner (gold bezel + dark green screen) -->
  <circle cx="128" cy="90" r="36" fill="#060e04" stroke="#c09a18" stroke-width="5"/>

  <!-- Scan sweep wedge -->
  <polygon points="128,90 128,54 159,72" fill="#4a8020" opacity="0.65"/>

  <!-- Center pip -->
  <circle cx="128" cy="90" r="6" fill="#72b82a"/>

  <!-- Gold dividing stripe -->
  <rect x="56" y="140" width="144" height="7" rx="2" fill="#c09018"/>

  <!-- Status dots: two amber, one red -->
  <circle cx="88" cy="165" r="10" fill="#d08018"/>
  <circle cx="128" cy="165" r="10" fill="#d08018"/>
  <circle cx="168" cy="165" r="10" fill="#b01818"/>

</svg>
