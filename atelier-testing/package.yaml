_common/lib: !include "../_common/package.yaml"

name:                atelier-testing
version:             0.1.0.0
synopsis:            Database-backed test utilities for atelier
description:         Test utilities for database-backed tests using tmp-postgres — part of the atelier toolkit.
author:              Christian Georgii
maintainer:          christian.georgii@tweag.io
license:             MIT
license-file:        LICENSE
github:              atelier-hub/tricorder
category:            Testing

extra-doc-files:
- CHANGELOG.md
- README.md

language: GHC2021

ghc-options:
- -Weverything
- -Wno-unsafe
- -Wno-missing-safe-haskell-mode
- -Wno-monomorphism-restriction
- -Wno-missing-kind-signatures
- -Wno-missing-poly-kind-signatures
- -Wno-missing-role-annotations
- -Wno-missing-local-signatures
- -Wno-missing-import-lists
- -Wno-implicit-prelude
- -Wno-unticked-promoted-constructors
- -Wno-unused-packages
# Missed-specialisation warnings fire on imported overloaded functions that we
# can't annotate with INLINABLE. They only appear under optimization and aren't
# actionable.
- -Wno-all-missed-specialisations
- -Wno-missed-specialisations
- -fplugin=Effectful.Plugin
- -threaded

dependencies:
- *dep-effectful-core
- *dep-effectful-plugin

default-extensions:
- BlockArguments
- DataKinds
- DeriveAnyClass
- DerivingStrategies
- DerivingVia
- DuplicateRecordFields
- FlexibleContexts
- GADTs
- LambdaCase
- MultiWayIf
- OverloadedLabels
- OverloadedRecordDot
- OverloadedStrings
- StrictData
- TemplateHaskell
- TypeFamilies

library:
  source-dirs: src
  dependencies:
  - name: base
    version: *version-base
    mixin:
      - hiding (Prelude)
  - *dep-atelier-prelude
  - *dep-atelier-core
  - *dep-atelier-db
  - *dep-hasql
  - *dep-hasql-pool
  - *dep-hspec
  - *dep-postgres-options
  - *dep-string-conversions
  - *dep-text
  - *dep-tmp-postgres
  - *dep-unix
  - *dep-uuid
