# Generated with nix2hpack from package.nix

author: Christian Georgii
category: Testing
default-extensions:
  - BlockArguments
  - DataKinds
  - DeriveAnyClass
  - DerivingStrategies
  - DerivingVia
  - DuplicateRecordFields
  - FlexibleContexts
  - GADTs
  - LambdaCase
  - MultiWayIf
  - OverloadedLabels
  - OverloadedRecordDot
  - OverloadedStrings
  - StrictData
  - TemplateHaskell
  - TypeFamilies
dependencies:
  - effectful-core >=2.6 && <2.7
  - effectful-plugin >=2.0 && <2.1
description: Test utilities for database-backed tests using tmp-postgres — part of the atelier toolkit.
extra-doc-files:
  - CHANGELOG.md
  - README.md
ghc-options:
  - -Weverything
  - -Wno-unsafe
  - -Wno-missing-safe-haskell-mode
  - -Wno-monomorphism-restriction
  - -Wno-missing-kind-signatures
  - -Wno-missing-poly-kind-signatures
  - -Wno-missing-role-annotations
  - -Wno-missing-local-signatures
  - -Wno-missing-import-lists
  - -Wno-implicit-prelude
  - -Wno-unticked-promoted-constructors
  - -Wno-unused-packages
  - -Wno-all-missed-specialisations
  - -Wno-missed-specialisations
  - -fplugin=Effectful.Plugin
  - -threaded
github: atelier-hub/tricorder
language: GHC2021
library:
  dependencies:
    - mixin:
        - hiding (Prelude)
      name: base
      version: '>=4.20 && < 4.21'
    - atelier-prelude >=0.1 && <0.2
    - atelier-core >=0.1 && <0.2
    - atelier-db >=0.1 && <0.2
    - hasql >=1.9 && <1.10
    - hasql-pool >=1.3 && <1.4
    - hspec >=2.11 && <2.12
    - postgres-options >=0.2 && <0.3
    - string-conversions >=0.4 && <0.5
    - text >=2.1 && <2.2
    - tmp-postgres >=1.35 && <1.36
    - unix >=2.8 && <2.9
    - uuid >=1.3 && <1.4
  source-dirs: src
license: MIT
license-file: LICENSE
maintainer: christian.georgii@tweag.io
name: atelier-testing
synopsis: Database-backed test utilities for atelier
version: 0.1.0.0
