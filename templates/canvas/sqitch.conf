[core]
	engine = pg
	top_dir = db
	plan_file = db/sqitch.plan

[engine "pg"]
	# Local dev database started with: nix run .#postgres
	# Uses the PGHOST set by the dev shell / socket under ./data/postgres
	target = db:pg://postgres@/canvas_dev

[target "dev"]
	uri = db:pg://postgres@/canvas_dev

# Uncomment and configure for other environments:
# [target "prod"]
# 	uri = db:pg://user@host/dbname
