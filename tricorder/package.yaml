# Generated with nix2hpack from package.nix

author: Christian Georgii
category: Development
default-extensions:
  - BlockArguments
  - DataKinds
  - DeriveAnyClass
  - DerivingStrategies
  - DerivingVia
  - DuplicateRecordFields
  - FlexibleContexts
  - GADTs
  - LambdaCase
  - MultiWayIf
  - OverloadedLabels
  - OverloadedRecordDot
  - OverloadedStrings
  - StrictData
  - TemplateHaskell
  - TypeFamilies
dependencies:
  - effectful-core >=2.6 && <2.7
  - effectful-plugin >=2.0 && <2.1
description: tricorder rebuilds your Haskell project continuously and surfaces build status, diagnostics, test results, and documentation - for developers and LLM coding agents. Like ghcid and ghciwatch it reloads on every change, but builds run in a background daemon so multiple clients (an interactive TUI, a status CLI, an agent skill) share a single build state without triggering redundant rebuilds. It discovers components across multi-package cabal.project workspaces automatically and ships context-friendly output for agentic use via the CLI.
executables:
  tricorder:
    dependencies:
      - mixin:
          - hiding (Prelude)
        name: base
        version: '>=4.20 && < 4.21'
      - tricorder-internal
      - atelier-prelude >=0.1 && <0.2
    ghc-options:
      - '"-with-rtsopts=-N -T"'
    main: Main.hs
    source-dirs: app
  tricorder-daemon:
    dependencies:
      - mixin:
          - hiding (Prelude)
        name: base
        version: '>=4.20 && < 4.21'
      - tricorder-internal
      - atelier-prelude >=0.1 && <0.2
    ghc-options:
      - '"-with-rtsopts=-N -T"'
    main: Main.hs
    source-dirs: daemon
extra-doc-files:
  - README.md
ghc-options:
  - -Weverything
  - -Wno-unsafe
  - -Wno-missing-safe-haskell-mode
  - -Wno-monomorphism-restriction
  - -Wno-missing-kind-signatures
  - -Wno-missing-poly-kind-signatures
  - -Wno-missing-role-annotations
  - -Wno-missing-local-signatures
  - -Wno-missing-import-lists
  - -Wno-implicit-prelude
  - -Wno-unticked-promoted-constructors
  - -Wno-unused-packages
  - -Wno-all-missed-specialisations
  - -Wno-missed-specialisations
  - -fplugin=Effectful.Plugin
  - -threaded
github: atelier-hub/tricorder
internal-libraries:
  tricorder-internal:
    dependencies:
      - mixin:
          - hiding (Prelude)
        name: base
        version: '>=4.20 && < 4.21'
      - atelier-prelude >=0.1 && <0.2
      - atelier-core >=0.1 && <0.2
      - Cabal-syntax >=3.12 && <3.13
      - aeson >=2.2 && <2.3
      - ansi-terminal >=1.1 && <1.2
      - brick >=2.10 && <2.11
      - bytestring >=0.12 && <0.13
      - casing >=0.1 && <0.2
      - containers >=0.7 && <0.8
      - data-default >=0.8 && <0.9
      - directory >=1.3 && <1.4
      - effectful >=2.6 && <2.7
      - effectful-th >=1.0 && <1.1
      - filepath >=1.5 && <1.6
      - hashable >=1.5 && <1.6
      - process >=1.6 && <1.7
      - template-haskell >=2.22 && <2.23
      - megaparsec >=9.7 && <9.8
      - mtl >=2.3 && <2.4
      - network >=3.2 && <3.3
      - optparse-applicative >=0.19 && <0.20
      - relude >=1.2 && <1.3
      - stm >=2.5 && <2.6
      - text >=2.1 && <2.2
      - time >=1.12 && <1.13
      - time-units >=1.0 && <1.1
      - vty >=6.5 && <6.6
      - vty-crossplatform >=0.5 && <0.6
      - yaml >=0.11 && <0.12
    source-dirs: src
language: GHC2021
license: MIT
license-file: LICENSE
maintainer: christian.georgii@tweag.io
name: tricorder
synopsis: Continuous Haskell build status, diagnostics, and tests via a shared daemon
tests:
