    build-tools:
      - tasty-discover:tasty-discover
    dependencies:
      - mixin:
          - hiding (Prelude)
        name: base
        version: '>=4.20 && < 4.21'
      - tricorder-internal
      - atelier-prelude >=0.1 && <0.2
      - atelier-core >=0.1 && <0.2
      - Cabal-syntax >=3.12 && <3.13
      - aeson >=2.2 && <2.3
      - containers >=0.7 && <0.8
      - data-default >=0.8 && <0.9
      - effectful >=2.6 && <2.7
      - hspec >=2.11 && <2.12
      - process >=1.6 && <1.7
