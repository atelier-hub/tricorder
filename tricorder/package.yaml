_common/lib: !include "../_common/package.yaml"

name:                tricorder
version:             0.1.1.0
synopsis:            Continuous Haskell build status, diagnostics, and tests via a shared daemon
description:         tricorder rebuilds your Haskell project continuously and surfaces build status, diagnostics, test results, and documentation - for developers and LLM coding agents. Like ghcid and ghciwatch it reloads on every change, but builds run in a background daemon so multiple clients (an interactive TUI, a status CLI, an agent skill) share a single build state without triggering redundant rebuilds. It discovers components across multi-package cabal.project workspaces automatically and ships context-friendly output for agentic use via the CLI.
author:              Christian Georgii
maintainer:          christian.georgii@tweag.io
license:             MIT
license-file:        LICENSE
github:              atelier-hub/tricorder
category:            Development

extra-doc-files:
- README.md

language: GHC2021

ghc-options:
- -Weverything
- -Wno-unsafe
- -Wno-missing-safe-haskell-mode
- -Wno-monomorphism-restriction
- -Wno-missing-kind-signatures
- -Wno-missing-poly-kind-signatures
- -Wno-missing-role-annotations
- -Wno-missing-local-signatures
- -Wno-missing-import-lists
- -Wno-implicit-prelude
- -Wno-unticked-promoted-constructors
- -Wno-unused-packages
- -fplugin=Effectful.Plugin
- -threaded

dependencies:
- *dep-effectful-core
- *dep-effectful-plugin

default-extensions:
- BlockArguments
- DataKinds
- DeriveAnyClass
- DerivingStrategies
- DerivingVia
- DuplicateRecordFields
- FlexibleContexts
- GADTs
- LambdaCase
- MultiWayIf
- OverloadedLabels
- OverloadedRecordDot
- OverloadedStrings
- StrictData
- TemplateHaskell
- TypeFamilies

# tricorder ships as executables only. Shared code lives in a private internal
# library that the executables and the test-suite consume; it is not exposed on
# Hackage.
internal-libraries:
  tricorder-internal:
    source-dirs: src
    dependencies:
    - name: base
      version: *version-base
      mixin:
        - hiding (Prelude)
    - *dep-atelier-prelude
    - *dep-atelier-core
    - *dep-Cabal-syntax
    - *dep-aeson
    - *dep-ansi-terminal
    - *dep-brick
    - *dep-bytestring
    - *dep-casing
    - *dep-containers
    - *dep-data-default
    - *dep-directory
    - *dep-effectful
    - *dep-effectful-th
    - *dep-filepath
    - *dep-hashable
    - *dep-process
    - *dep-template-haskell
    - *dep-megaparsec
    - *dep-mtl
    - *dep-network
    - *dep-optparse-applicative
    - *dep-relude
    - *dep-stm
    - *dep-text
    - *dep-time
    - *dep-time-units
    - *dep-vty
    - *dep-vty-crossplatform
    - *dep-yaml

executables:
  tricorder:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - '"-with-rtsopts=-N -T"'
    dependencies:
    - name: base
      version: *version-base
      mixin:
        - hiding (Prelude)
    - *dep-atelier-prelude
    - tricorder-internal
  tricorder-daemon:
    main:                Main.hs
    source-dirs:         daemon
    ghc-options:
      - '"-with-rtsopts=-N -T"'
    dependencies:
    - name: base
      version: *version-base
      mixin:
        - hiding (Prelude)
    - *dep-atelier-prelude
    - tricorder-internal

tests:
  tricorder-test:
    main:                Driver.hs
    source-dirs:         test
    ghc-options:
    - -Wno-prepositive-qualified-module
    build-tools:
    - tasty-discover:tasty-discover
    dependencies:
    - name: base
      version: *version-base
      mixin:
        - hiding (Prelude)
    - *dep-atelier-prelude
    - tricorder-internal
    - *dep-atelier-core
    - *dep-Cabal-syntax
    - *dep-aeson
    - *dep-containers
    - *dep-data-default
    - *dep-effectful
    - *dep-hspec
    - *dep-process
    - *dep-stm
    - *dep-tasty
    - *dep-tasty-discover
    - *dep-tasty-hspec
    - *dep-text
    - *dep-time
    - *dep-time-units
    - *dep-typed-process
    - *dep-unagi-chan
