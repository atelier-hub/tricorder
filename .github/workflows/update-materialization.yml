name: Update materialization

on:
  pull_request:
    paths:
      - "**.cabal"
      - "cabal.project"
      - "flake.lock"
      - "nix/project.nix"
  workflow_dispatch:

jobs:
  update:
    strategy:
      matrix:
        os:
          - macos-14
          - ubuntu-latest
        ghc-version:
          - ghc9102
          - ghc912
          - ghc914
          - ghc98
        include:
          - os: macos-14
            system: aarch64-darwin
          - os: ubuntu-latest
            system: x86_64-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            extra-substituters = https://cache.iog.io
            extra-trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ=

      - uses: cachix/cachix-action@v17
        with:
          name: atelier
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}

      - name: Regenerate ${{ matrix.ghc-version}}/${{ matrix.system }} materialization
        run: |
          set -o pipefail
          nix build --no-link 2>&1 | tee /tmp/build.log || {
            if grep -q 'generateMaterialized' /tmp/build.log; then
              grep -o '/[/[:alnum:]._-]*-generateMaterialized [/_[:alnum:]/.-]*$' /tmp/build.log | sh
            else
              echo "Build failed for a reason unrelated to materialization" >&2
              cat /tmp/build.log >&2
              exit 1
            fi
          }

      - uses: peter-evans/create-pull-request@v7
        if: github.event.pull_request.head.repo.full_name == github.repository
        with:
          token: ${{ steps.app-token.outputs.token }}
          base: ${{ github.head_ref }}
          branch: ci/update-aarch64-darwin-materialization-${{ github.head_ref }}
          commit-message: "chore: update aarch64-darwin materialization"
          title: "chore: update aarch64-darwin materialization"
          body: |
            Automated update of `nix/materialized/ghc9102/aarch64-darwin` triggered by dependency changes on `${{ github.head_ref }}`.
          add-paths: nix/materialized/ghc9102/aarch64-darwin
